package ecliptix.proto.device;
option csharp_namespace = "Ecliptix.Protobuf.Device";
option swift_prefix = "Ctx";

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_MOBILE = 1;
  DEVICE_TYPE_DESKTOP = 2;
}

message Device {
  bytes application_instance_id = 1;
  bytes device_id = 2;
  DeviceType device_type = 3;
}

message DeviceRegistrationResponse {
  enum Result {
    DEVICE_REGISTRATION_RESULT_UNSPECIFIED = 0;
    DEVICE_REGISTRATION_RESULT_NEW_REGISTRATION = 1;
    DEVICE_REGISTRATION_RESULT_ALREADY_EXISTS = 2;
    DEVICE_REGISTRATION_RESULT_INVALID_REQUEST = 3;
    DEVICE_REGISTRATION_RESULT_INTERNAL_ERROR = 4;
  }

  Result result = 1;
  string message = 2;
}
