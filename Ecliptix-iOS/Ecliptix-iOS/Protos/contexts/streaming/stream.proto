package ecliptix.proto.streaming;
option csharp_namespace = "Ecliptix.Protobuf.Streaming";
option swift_prefix = "Proto";

import "google/protobuf/timestamp.proto";

enum StreamStatus {
  STREAM_STATUS_UNSPECIFIED = 0;
  STREAM_STATUS_CREATED = 1;
  STREAM_STATUS_LIVE = 2;
  STREAM_STATUS_ENDED = 3;
  STREAM_STATUS_VOD_READY = 4;
  STREAM_STATUS_FAILED = 5;
}

enum VideoStatus {
  VIDEO_STATUS_UNSPECIFIED = 0;
  VIDEO_STATUS_UPLOADING = 1;
  VIDEO_STATUS_PROCESSING = 2;
  VIDEO_STATUS_READY = 3;
  VIDEO_STATUS_FAILED = 4;
  VIDEO_STATUS_REMOVED = 5;
}

enum VideoCategory {
  VIDEO_CATEGORY_UNSPECIFIED = 0;
  VIDEO_CATEGORY_GENERAL = 1;
  VIDEO_CATEGORY_MUSIC = 2;
  VIDEO_CATEGORY_GAMING = 3;
  VIDEO_CATEGORY_EDUCATION = 4;
  VIDEO_CATEGORY_ENTERTAINMENT = 5;
  VIDEO_CATEGORY_SPORTS = 6;
  VIDEO_CATEGORY_NEWS = 7;
}

enum ReactionType {
  REACTION_TYPE_UNSPECIFIED = 0;
  REACTION_TYPE_LIKE = 1;
  REACTION_TYPE_LOVE = 2;
  REACTION_TYPE_FIRE = 3;
  REACTION_TYPE_LAUGH = 4;
  REACTION_TYPE_SAD = 5;
}

message CreateStreamRequest {
  string title = 1;
  VideoCategory category = 2;
  optional string description = 3;
}

message CreateStreamResponse {
  bytes stream_id = 1;
  string rtmp_ingest_url = 2;
  string stream_key = 3;
  google.protobuf.Timestamp created_at = 4;
}

message StartStreamRequest {
  bytes stream_id = 1;
}

message StartStreamResponse {
  StreamStatus status = 1;
}

message EndStreamRequest {
  bytes stream_id = 1;
}

message EndStreamResponse {
  StreamStatus status = 1;
  optional string vod_playback_url = 2;
}

message GetStreamRequest {
  bytes stream_id = 1;
}

message StreamInfo {
  bytes stream_id = 1;
  bytes broadcaster_id = 2;
  string title = 3;
  VideoCategory category = 4;
  optional string description = 5;
  StreamStatus status = 6;
  uint64 viewer_count = 7;
  optional string hls_playback_url = 8;
  optional string thumbnail_url = 9;
  google.protobuf.Timestamp created_at = 10;
  optional google.protobuf.Timestamp started_at = 11;
  optional google.protobuf.Timestamp ended_at = 12;
}

message ListLiveStreamsRequest {
  uint32 limit = 1;
  optional bytes cursor = 2;
  optional VideoCategory category = 3;
}

message ListLiveStreamsResponse {
  repeated StreamInfo streams = 1;
  optional bytes next_cursor = 2;
}

message StreamViewerUpdate {
  bytes stream_id = 1;
  uint64 viewer_count = 2;
}

message StreamReactionRequest {
  bytes stream_id = 1;
  ReactionType reaction = 2;
}

message StreamReactionResponse {}

message StreamChatMessage {
  bytes message_id = 1;
  bytes stream_id = 2;
  bytes sender_id = 3;
  string text = 4;
  google.protobuf.Timestamp sent_at = 5;
}

message SendStreamChatRequest {
  bytes stream_id = 1;
  string text = 2;
}

message SendStreamChatResponse {
  bytes message_id = 1;
  google.protobuf.Timestamp sent_at = 2;
}

message CreateVideoUploadRequest {
  string title = 1;
  optional string description = 2;
  VideoCategory category = 3;
  uint64 file_size_bytes = 4;
  string mime_type = 5;
  optional uint32 duration_seconds = 6;
}

message CreateVideoUploadResponse {
  bytes video_id = 1;
  string upload_url = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message CompleteVideoUploadRequest {
  bytes video_id = 1;
}

message CompleteVideoUploadResponse {
  VideoStatus status = 1;
}

message GetVideoRequest {
  bytes video_id = 1;
}

message VideoInfo {
  bytes video_id = 1;
  bytes creator_id = 2;
  string title = 3;
  optional string description = 4;
  VideoCategory category = 5;
  VideoStatus status = 6;
  optional string hls_playback_url = 7;
  optional string thumbnail_url = 8;
  uint64 like_count = 9;
  uint64 comment_count = 10;
  uint64 share_count = 11;
  uint64 view_count = 12;
  optional uint32 duration_seconds = 13;
  google.protobuf.Timestamp created_at = 14;
}

message ListVideoFeedRequest {
  uint32 limit = 1;
  optional bytes cursor = 2;
  optional VideoCategory category = 3;
}

message ListVideoFeedResponse {
  repeated VideoInfo videos = 1;
  optional bytes next_cursor = 2;
}

message VideoReactionRequest {
  bytes video_id = 1;
  ReactionType reaction = 2;
  bool remove = 3;
}

message VideoReactionResponse {
  uint64 like_count = 1;
}

message VideoCommentRequest {
  bytes video_id = 1;
  string text = 2;
  optional bytes reply_to_comment_id = 3;
}

message VideoCommentResponse {
  bytes comment_id = 1;
  google.protobuf.Timestamp created_at = 2;
}

message ListVideoCommentsRequest {
  bytes video_id = 1;
  uint32 limit = 2;
  optional bytes cursor = 3;
}

message VideoComment {
  bytes comment_id = 1;
  bytes video_id = 2;
  bytes author_id = 3;
  string text = 4;
  optional bytes reply_to_comment_id = 5;
  uint64 like_count = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListVideoCommentsResponse {
  repeated VideoComment comments = 1;
  optional bytes next_cursor = 2;
}

message IncrementViewRequest {
  bytes video_id = 1;
}

message IncrementViewResponse {
  uint64 view_count = 1;
}

message DeleteVideoRequest {
  bytes video_id = 1;
}

message DeleteVideoResponse {}
