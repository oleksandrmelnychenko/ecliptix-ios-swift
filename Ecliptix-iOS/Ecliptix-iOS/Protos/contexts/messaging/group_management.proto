import "google/protobuf/timestamp.proto";
import "contexts/messaging/conversation.proto";

package ecliptix.proto.messaging;
option csharp_namespace = "Ecliptix.Protobuf.Messaging";
option swift_prefix = "Proto";

message AddGroupMembersRequest {
  bytes membership_id = 1;
  bytes conversation_id = 2;
  repeated bytes new_member_membership_ids = 3;
  bytes account_id = 4;
}

message AddGroupMembersResponse {
  repeated ParticipantInfo added_members = 1;
  bool is_success = 2;
}

message RemoveGroupMemberRequest {
  bytes membership_id = 1;
  bytes conversation_id = 2;
  bytes target_membership_id = 3;
  bytes account_id = 4;
}

message RemoveGroupMemberResponse {
  bool is_success = 1;
}

message UpdateMemberRoleRequest {
  bytes membership_id = 1;
  bytes conversation_id = 2;
  bytes target_membership_id = 3;
  ParticipantRole new_role = 4;
  bytes account_id = 5;
}

message UpdateMemberRoleResponse {
  bool is_success = 1;
}

message LeaveGroupRequest {
  bytes membership_id = 1;
  bytes conversation_id = 2;
  bytes account_id = 3;
}

message LeaveGroupResponse {
  bool is_success = 1;
}
