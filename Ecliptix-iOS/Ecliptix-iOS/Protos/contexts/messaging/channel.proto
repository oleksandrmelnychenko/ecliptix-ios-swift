import "contexts/messaging/conversation.proto";

package ecliptix.proto.messaging;
option csharp_namespace = "Ecliptix.Protobuf.Messaging";
option swift_prefix = "Proto";

message CreateChannelRequest {
  bytes creator_membership_id = 1;
  string title = 2;
  optional string description = 3;
  optional string avatar_url = 4;
  bool is_public = 5;
  bool admin_signatures = 6;
  bytes account_id = 7;
}

message CreateChannelResponse {
  Conversation conversation = 1;
}

message UpdateChannelSettingsRequest {
  bytes channel_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional bool is_public = 4;
  optional bool admin_signatures = 5;
  optional int32 slow_mode_seconds = 6;
}

message UpdateChannelSettingsResponse {
  bool is_success = 1;
}

message RecordPostViewRequest {
  bytes channel_id = 1;
  repeated bytes message_ids = 2;
}

message RecordPostViewResponse {
  bool is_success = 1;
}

message LinkDiscussionGroupRequest {
  bytes channel_id = 1;
  bytes group_id = 2;
}

message LinkDiscussionGroupResponse {
  bool is_success = 1;
}

message SearchPublicChannelsRequest {
  string query = 1;
  optional int32 page_size = 2;
  optional string page_token = 3;
}

message SearchPublicChannelsResponse {
  repeated ConversationInfo channels = 1;
  string next_page_token = 2;
}
