message EventIdentity {
  string event_id = 1;
  TransportEventType event_type = 2;
  EventContext context = 3;
  string correlation_id = 4;
  string causation_id = 5;
  string partition_key = 6;
  DeliveryKind delivery_kind = 7;
}

message ClientContext {
  string locale = 1;
  string tenant = 2;
  string request_id = 3;
  string idempotency_key = 4;
  string platform = 5;
  string version = 6;
  bytes device_id = 7;
  bytes application_instance_id = 8;
}

message SecurityContext {
  uint64 connect_id = 1;
  string key_exchange_context = 2;
  int64 client_timestamp = 3;
}

message EventOutcome {
  string status = 1;
  string error_code = 2;
  string message_key = 3;
  bool retryable = 4;
  string localized_message = 5;
}

enum DeliveryKind {
  DELIVERY_KIND_UNSPECIFIED = 0;
  DELIVERY_KIND_UNARY = 1;
  DELIVERY_KIND_SERVER_STREAM = 2;
  DELIVERY_KIND_CLIENT_STREAM = 3;
  DELIVERY_KIND_BIDI_STREAM = 4;
}

enum EventContext {
  EVENT_CONTEXT_UNSPECIFIED = 0;
  EVENT_CONTEXT_IDENTITY_ACCESS = 1;
  EVENT_CONTEXT_DEVICE_PROVISIONING = 2;
  EVENT_CONTEXT_MESSAGING = 3;
  EVENT_CONTEXT_PRESENCE = 4;
  EVENT_CONTEXT_STREAMING = 5;
  EVENT_CONTEXT_E2E_CRYPTO = 6;
  EVENT_CONTEXT_COMMENTS = 7;
  EVENT_CONTEXT_FEED = 8;
}

message EventEnvelope {
  EventMetadata metadata = 1;
  bytes payload = 2;
}
