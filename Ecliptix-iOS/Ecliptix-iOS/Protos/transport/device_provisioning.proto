package ecliptix.transport.device_provisioning;
option csharp_namespace = "Ecliptix.Protobuf.Transport.DeviceProvisioning";
option swift_prefix = "Proto";

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_MOBILE = 1;
  DEVICE_TYPE_DESKTOP = 2;
}

message Device {
  bytes application_instance_id = 1;
  bytes device_id = 2;
  DeviceType device_type = 3;
}

message DeviceRegistrationResponse {
  enum Result {
    RESULT_UNSPECIFIED = 0;
    RESULT_NEW_REGISTRATION = 1;
    RESULT_ALREADY_EXISTS = 2;
    RESULT_INVALID_REQUEST = 3;
    RESULT_INTERNAL_ERROR = 4;
  }

  Result result = 1;
  string message = 2;
}

message SessionRecoveryRequest {}

message SessionRecoveryResponse {
  enum Result {
    RESULT_UNSPECIFIED = 0;
    RESULT_NOT_FOUND = 1;
    RESULT_RESTORED = 2;
  }

  Result result = 1;
  int32 sending_chain_index = 2;
  int32 receiving_chain_index = 3;
}

message AuthenticatedSessionHandshakeRequest {
  message Identity {
    bytes membership_id = 1;
    bytes account_id = 2;
  }

  message Cryptography {
    bytes master_key_fingerprint = 1;
    bytes handshake_init = 2;
    bytes client_nonce = 3;
    bytes proof = 4;
    bytes server_nonce = 5;
  }

  Identity identity = 1;
  Cryptography cryptography = 2;
}

message ServerPublicKeysRequest {}

message ServerPublicKeysResponse {
  bytes server_public_key = 1;
  bytes server_prekey_bundle = 2;
  bytes server_nonce = 3;
}
