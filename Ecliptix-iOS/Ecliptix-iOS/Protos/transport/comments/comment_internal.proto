package ecliptix.transport.comments;
option csharp_namespace = "Ecliptix.Protobuf.Transport.Comments";
option swift_prefix = "";

import "contexts/comments/comment.proto";

service CommentInternal {
  rpc CreateComment(InternalCreateCommentRequest) returns (ecliptix.proto.comments.CreateCommentResponse);
  rpc EditComment(InternalEditCommentRequest) returns (ecliptix.proto.comments.EditCommentResponse);
  rpc DeleteComment(InternalDeleteCommentRequest) returns (ecliptix.proto.comments.DeleteCommentResponse);
  rpc LikeComment(InternalLikeCommentRequest) returns (ecliptix.proto.comments.LikeCommentResponse);
  rpc GetComments(InternalGetCommentsRequest) returns (ecliptix.proto.comments.GetCommentsResponse);
  rpc GetCommentThread(InternalGetCommentThreadRequest) returns (ecliptix.proto.comments.GetCommentThreadResponse);
  rpc GetCommentCount(InternalGetCommentCountRequest) returns (ecliptix.proto.comments.GetCommentCountResponse);
}

message InternalCreateCommentRequest {
  bytes sender_membership_id = 1;
  bytes sender_account_id = 3;
  ecliptix.proto.comments.CreateCommentRequest request = 2;
}

message InternalEditCommentRequest {
  bytes sender_membership_id = 1;
  bytes sender_account_id = 3;
  ecliptix.proto.comments.EditCommentRequest request = 2;
}

message InternalDeleteCommentRequest {
  bytes sender_membership_id = 1;
  bytes sender_account_id = 3;
  ecliptix.proto.comments.DeleteCommentRequest request = 2;
}

message InternalLikeCommentRequest {
  bytes sender_membership_id = 1;
  bytes sender_account_id = 3;
  ecliptix.proto.comments.LikeCommentRequest request = 2;
}

message InternalGetCommentsRequest {
  bytes membership_id = 1;
  bytes account_id = 3;
  ecliptix.proto.comments.GetCommentsRequest request = 2;
}

message InternalGetCommentThreadRequest {
  bytes membership_id = 1;
  bytes account_id = 3;
  ecliptix.proto.comments.GetCommentThreadRequest request = 2;
}

message InternalGetCommentCountRequest {
  bytes membership_id = 1;
  bytes account_id = 3;
  ecliptix.proto.comments.GetCommentCountRequest request = 2;
}
