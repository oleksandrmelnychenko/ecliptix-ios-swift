package ecliptix.transport.e2e;
option csharp_namespace = "Ecliptix.Protobuf.Transport.E2E";
option swift_prefix = "";

service E2eInternal {
  rpc UploadKeyPackages(InternalUploadKeyPackagesRequest) returns (InternalE2EAck);
  rpc FetchKeyPackage(InternalFetchKeyPackageRequest) returns (InternalFetchKeyPackageResponse);
  rpc UploadPrekeyBundle(InternalUploadPrekeyBundleRequest) returns (InternalE2EAck);
  rpc FetchPrekeyBundle(InternalFetchPrekeyBundleRequest) returns (InternalFetchPrekeyBundleResponse);
  rpc SendGroupCommit(InternalSendGroupCommitRequest) returns (InternalE2EAck);
  rpc SendGroupMessage(InternalSendGroupMessageRequest) returns (InternalE2EAck);
  rpc SendWelcome(InternalSendWelcomeRequest) returns (InternalE2EAck);
  rpc FetchPendingEvents(InternalFetchPendingEventsRequest) returns (InternalFetchPendingEventsResponse);
  rpc AckEvents(InternalAckEventsRequest) returns (InternalE2EAck);
  rpc StreamPendingEvents(InternalStreamPendingEventsRequest) returns (stream InternalPendingEvent);
  rpc DeviceLinkInit(InternalDeviceLinkInitRequest) returns (InternalDeviceLinkInitResponse);
  rpc DeviceLinkComplete(InternalDeviceLinkCompleteRequest) returns (InternalE2EAck);
}

message InternalE2EAck {
  bool success = 1;
  optional string error_message = 2;
}

message InternalUploadKeyPackagesRequest {
  bytes sender_device_id = 1;
  repeated bytes key_packages = 2;
  uint32 ttl_hours = 3;
  bytes sender_account_id = 4;
}

message InternalFetchKeyPackageRequest {
  bytes requester_device_id = 1;
  bytes target_device_id = 2;
}

message InternalFetchKeyPackageResponse {
  bytes key_package = 1;
  bool found = 2;
}

message InternalUploadPrekeyBundleRequest {
  bytes sender_device_id = 1;
  bytes bundle = 2;
  bytes sender_account_id = 3;
}

message InternalFetchPrekeyBundleRequest {
  bytes requester_device_id = 1;
  bytes target_device_id = 2;
}

message InternalFetchPrekeyBundleResponse {
  bytes bundle = 1;
  bool found = 2;
}

message InternalCreatorIdentity {
  bytes identity_ed25519_public = 1;
  bytes identity_x25519_public = 2;
  bytes credential = 3;
}

message InternalWelcomeTarget {
  bytes recipient_device = 1;
  optional bytes target_key_package_hash = 2;
}

message InternalSendGroupCommitRequest {
  bytes sender_device_id = 1;
  bytes group_id = 2;
  uint64 new_epoch = 3;
  bytes commit_payload = 4;
  bytes welcome_payload = 5;
  repeated bytes recipient_devices = 6;
  optional InternalCreatorIdentity creator_identity = 7;
  optional bytes conversation_id = 8;
  repeated InternalWelcomeTarget welcome_targets = 9;
}

message InternalSendGroupMessageRequest {
  bytes sender_device_id = 1;
  bytes group_id = 2;
  uint64 epoch = 3;
  bytes encrypted_payload = 4;
  repeated bytes recipient_devices = 5;
}

message InternalSendWelcomeRequest {
  bytes sender_device_id = 1;
  bytes group_id = 2;
  bytes welcome_payload = 3;
  repeated bytes recipient_devices = 4;
  repeated InternalWelcomeTarget welcome_targets = 5;
}

message InternalFetchPendingEventsRequest {
  bytes device_id = 1;
  int64 after_seq = 2;
  uint32 max_events = 3;
}

message InternalFetchPendingEventsResponse {
  repeated InternalPendingEvent events = 1;
  bool has_more = 2;
}

message InternalPendingEvent {
  int64 server_seq = 1;
  string event_type = 2;
  bytes sender_device = 3;
  bytes group_id = 4;
  optional uint64 epoch = 5;
  bytes payload = 6;
  int64 created_at_seconds = 7;
  optional bytes conversation_id = 8;
  optional uint32 target_leaf_index = 9;
  optional bytes target_key_package_hash = 10;
}

message InternalAckEventsRequest {
  bytes device_id = 1;
  repeated int64 server_seqs = 2;
}

message InternalStreamPendingEventsRequest {
  bytes device_id = 1;
  int64 after_seq = 2;
}

message InternalDeviceLinkInitRequest {
  bytes primary_device_id = 1;
  bytes ephemeral_public_key = 2;
  uint32 ttl_seconds = 3;
}

message InternalDeviceLinkInitResponse { string session_id = 1; }

message InternalDeviceLinkCompleteRequest {
  string session_id = 1;
  bytes linking_device_id = 2;
  bytes encrypted_payload = 3;
}
