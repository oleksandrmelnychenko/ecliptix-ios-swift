package ecliptix.proto.common;
option csharp_namespace = "Ecliptix.Protobuf.Common";
option swift_prefix = "Common";

import "google/protobuf/timestamp.proto";

message SecureEnvelope {
  bytes meta_data = 1;
  bytes encrypted_payload = 2;
  bytes result_code = 3;
  optional bytes authentication_tag = 4;
  google.protobuf.Timestamp timestamp = 5;
  optional bytes error_details = 6;
  bytes header_nonce = 7;
  optional bytes dh_public_key = 8;
  optional bytes kyber_ciphertext = 9;
  optional uint64 ratchet_epoch = 10;
}

message EnvelopeMetadata {
  string envelope_id = 1;
  bytes channel_key_id = 2;
  bytes nonce = 3;
  uint32 ratchet_index = 4;
  EnvelopeType envelope_type = 5;
  optional string correlation_id = 6;
}

message EnvelopeError {
  string error_code = 1;
  string error_message = 2;
  optional uint32 retry_after_seconds = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

enum EnvelopeResultCode {
  ENVELOPE_RESULT_CODE_UNSPECIFIED = 0;
  ENVELOPE_RESULT_CODE_SUCCESS = 1;
  ENVELOPE_RESULT_CODE_BAD_REQUEST = 2;
  ENVELOPE_RESULT_CODE_UNAUTHORIZED = 3;
  ENVELOPE_RESULT_CODE_FORBIDDEN = 4;
  ENVELOPE_RESULT_CODE_NOT_FOUND = 5;
  ENVELOPE_RESULT_CODE_METHOD_NOT_ALLOWED = 6;
  ENVELOPE_RESULT_CODE_CONFLICT = 7;
  ENVELOPE_RESULT_CODE_RATE_LIMITED = 8;
  ENVELOPE_RESULT_CODE_PAYLOAD_TOO_LARGE = 9;
  ENVELOPE_RESULT_CODE_INTERNAL_ERROR = 10;
  ENVELOPE_RESULT_CODE_SERVICE_UNAVAILABLE = 11;
  ENVELOPE_RESULT_CODE_GATEWAY_TIMEOUT = 12;
  ENVELOPE_RESULT_CODE_INSUFFICIENT_STORAGE = 13;
  ENVELOPE_RESULT_CODE_CRYPTO_ERROR = 20;
  ENVELOPE_RESULT_CODE_INVALID_SIGNATURE = 21;
  ENVELOPE_RESULT_CODE_EXPIRED_KEY = 22;
  ENVELOPE_RESULT_CODE_RATCHET_ERROR = 23;
  ENVELOPE_RESULT_CODE_DECRYPTION_FAILED = 24;
  ENVELOPE_RESULT_CODE_NETWORK_ERROR = 30;
  ENVELOPE_RESULT_CODE_CONNECTION_LOST = 31;
  ENVELOPE_RESULT_CODE_TIMEOUT = 32;
}

enum EnvelopeType {
  ENVELOPE_TYPE_UNSPECIFIED = 0;
  ENVELOPE_TYPE_REQUEST = 1;
  ENVELOPE_TYPE_RESPONSE = 2;
  ENVELOPE_TYPE_NOTIFICATION = 3;
  ENVELOPE_TYPE_HEARTBEAT = 4;
  ENVELOPE_TYPE_ERROR_RESPONSE = 5;
}
