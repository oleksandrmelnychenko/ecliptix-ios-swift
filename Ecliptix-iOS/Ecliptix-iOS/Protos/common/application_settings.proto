package ecliptix.proto.common;
option csharp_namespace = "Ecliptix.Protobuf.Common";
option swift_prefix = "Common";

import "contexts/identity_access/membership.proto";

message ApplicationInstanceSettings {
  bytes app_instance_id = 1;
  bytes device_id = 2;
  string country = 3;
  string culture = 4;
  bytes current_account_id = 5;
  bool is_new_instance = 6;
  WindowPlacement window_placement = 7;
  ecliptix.proto.membership.Membership membership = 8;
}

message WindowPlacement {
  double width = 1;
  double height = 2;
  double x = 3;
  double y = 4;
  bool is_maximized = 5;
  int32 position_x = 6;
  int32 position_y = 7;
  int32 client_width = 8;
  int32 client_height = 9;
  int32 window_state = 10;
  bool is_valid_save = 11;
}
