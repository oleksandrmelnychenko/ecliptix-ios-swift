package ecliptix.proto.protocol;
option csharp_namespace = "Ecliptix.Protobuf.Protocol";
option swift_prefix = "Proto";

message SealedState {
  uint32 version = 1;
  bytes dek_nonce = 2;
  bytes state_nonce = 3;
  bytes encrypted_dek = 4;
  bytes encrypted_state = 5;
}
